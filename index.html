<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransAudio | YouTube to MP3 Converter</title>
    <meta name="description" content="Convierte tus videos favoritos de YouTube a MP3 con una calidad excepcional y una interfaz moderna.">
    <meta name="theme-color" content="#0f172a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="glass-card">
            <h1>Trans<span>Audio</span></h1>
            <p>Extrae la esencia del sonido con elegancia.</p>
        </header>

        <section class="converter-section glass-card">
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Pega el enlace de YouTube aquí..." autocomplete="off">
                <button id="btnFetch" class="btn-primary">
                    <span class="btn-text">Analizar</span>
                    <div class="loader-small" id="fetchLoader" style="display: none;"></div>
                </button>
            </div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
        </section>

        <section id="videoInfo" class="video-info glass-card" style="display: none;">
            <div class="video-preview">
                <img id="thumbnail" src="" alt="Miniatura del video">
                <div class="duration-badge" id="duration">0:00</div>
            </div>
            <div class="video-details">
                <h2 id="videoTitle">Título del Video</h2>
                <p id="uploader">Nombre del Canal</p>
                <div class="action-area">
                    <button id="btnDownload" class="btn-download">
                        <span class="icon">⬇️</span>
                        <span>Descargar MP3</span>
                    </button>
                </div>
            </div>
        </section>

        <div id="downloadProgress" class="progress-container glass-card" style="display: none;">
            <div class="progress-info">
                <span>Convirtiendo audio...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <p class="progress-subtext">Esto puede tardar unos segundos dependiendo de la duración.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
